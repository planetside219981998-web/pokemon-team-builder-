<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#0f172a"/>
  <text x="195" y="60" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold" font-family="system-ui">Pokemon GO</text>
  <text x="195" y="90" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui">Team Builder</text>
  <!-- League selector -->
  <rect x="20" y="120" width="110" height="36" rx="8" fill="#ef4444"/>
  <text x="75" y="143" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">Great League</text>
  <rect x="140" y="120" width="110" height="36" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="195" y="143" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">Ultra League</text>
  <rect x="260" y="120" width="110" height="36" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="315" y="143" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">Master League</text>
  <!-- Team slots -->
  <rect x="20" y="180" width="110" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
  <circle cx="75" cy="225" r="25" fill="#ef444440"/>
  <text x="75" y="270" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Add Pokemon</text>
  <rect x="140" y="180" width="110" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
  <circle cx="195" cy="225" r="25" fill="#ef444440"/>
  <text x="195" y="270" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Add Pokemon</text>
  <rect x="260" y="180" width="110" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
  <circle cx="315" cy="225" r="25" fill="#ef444440"/>
  <text x="315" y="270" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Add Pokemon</text>
  <!-- Meta Pokemon section -->
  <rect x="20" y="320" width="350" height="450" rx="12" fill="#1e293b" stroke="#eab30830"/>
  <text x="40" y="350" fill="#eab308" font-size="14" font-weight="bold" font-family="system-ui">Meta Pokemon - Great League</text>
  <!-- Pokemon rows -->
  <g transform="translate(30, 370)">
    <text x="0" y="15" fill="#eab308" font-size="14">1</text>
    <circle cx="40" cy="10" r="14" fill="#334155"/>
    <text x="65" y="15" fill="white" font-size="12" font-family="system-ui">Medicham</text>
    <rect x="200" y="5" width="120" height="10" rx="5" fill="#334155"/>
    <rect x="200" y="5" width="118" height="10" rx="5" fill="#ef4444"/>
    <text x="330" y="15" fill="#94a3b8" font-size="10">99</text>
  </g>
  <g transform="translate(30, 405)">
    <text x="0" y="15" fill="#eab308" font-size="14">2</text>
    <circle cx="40" cy="10" r="14" fill="#334155"/>
    <text x="65" y="15" fill="white" font-size="12" font-family="system-ui">Bastiodon</text>
    <rect x="200" y="5" width="120" height="10" rx="5" fill="#334155"/>
    <rect x="200" y="5" width="112" height="10" rx="5" fill="#3b82f6"/>
    <text x="330" y="15" fill="#94a3b8" font-size="10">95</text>
  </g>
  <g transform="translate(30, 440)">
    <text x="0" y="15" fill="#94a3b8" font-size="14">3</text>
    <circle cx="40" cy="10" r="14" fill="#334155"/>
    <text x="65" y="15" fill="white" font-size="12" font-family="system-ui">Azumarill</text>
    <rect x="200" y="5" width="120" height="10" rx="5" fill="#334155"/>
    <rect x="200" y="5" width="105" height="10" rx="5" fill="#22c55e"/>
    <text x="330" y="15" fill="#94a3b8" font-size="10">91</text>
  </g>
  <!-- Bottom nav -->
  <rect x="0" y="790" width="390" height="54" fill="#0f172a" stroke="#334155"/>
  <text x="40" y="822" text-anchor="middle" fill="#ef4444" font-size="10" font-family="system-ui">Team</text>
  <text x="110" y="822" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Raids</text>
  <text x="180" y="822" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">IVs</text>
  <text x="245" y="822" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Battle</text>
  <text x="310" y="822" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Types</text>
  <text x="365" y="822" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui">Settings</text>
</svg>
